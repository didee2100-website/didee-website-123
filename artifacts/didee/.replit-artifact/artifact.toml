kind = "web"
previewPath = "/"
title = "DIDEE – Digital Flagship"
version = "1.0.0"
id = "artifacts/didee"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21971

[services.development]
run = "pnpm --filter @workspace/didee run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/didee", "run", "build" ]
publicDir = "artifacts/didee/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21971"
BASE_PATH = "/"
